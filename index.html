<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#ff4da6,#7b5cff);
    color:white;
}

.container{
    padding:40px;
}

h1{
    font-size:55px;
    margin-bottom:15px;
}

p{
    font-size:22px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container" id="content"></div>

<audio id="music" src="hbd.mp3"></audio>

<script>
const today = new Date();

const day = today.getDate();
const month = today.getMonth() + 1;

const content = document.getElementById("content");

if(day === 5 && month === 7){

content.innerHTML=`
<h1>🎉 Happy Birthday! 🎂</h1>
<p>Semoga panjang umur, sehat selalu,<br>
dan semua impianmu menjadi kenyataan. ❤️</p>

<button onclick="playBirthday()">
🎵 Putar Musik
</button>
`;

function fire(){
confetti({
particleCount:200,
spread:180,
origin:{y:0.6}
});
}

fire();

setInterval(fire,3000);

window.playBirthday=function(){
document.getElementById("music").play();

confetti({
particleCount:500,
spread:360
});
}

}else{

content.innerHTML=`
<h1>🎁</h1>
<p>Halaman ini hanya bisa dibuka pada tanggal <b>16 Juli</b>.</p>
`;

}
</script>

</body>
</html>
