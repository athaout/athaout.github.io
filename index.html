<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#ff4da6,#7b5cff);
    color:white;
}

.container{
    padding:40px;
    max-width:900px;
}

h1{
    font-size:55px;
    margin-bottom:30px;
}

#timer{
    font-size:35px;
    font-weight:bold;
}

button{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="container">

<h1>🎉 Happy Birthday! 🎂</h1>

<div id="timer">
Semoga panjang umur, sehat selalu, dan semua impianmu tercapai. 💖
</div>

<button onclick="playBirthday()">🎵 Putar Musik</button>

</div>

<audio id="music" src="hbd.mp3"></audio>

<script>

function fire(){
    confetti({
        particleCount:200,
        spread:180,
        origin:{y:0.6}
    });
}

setInterval(fire,3000);
fire();

function playBirthday(){

    document.getElementById("music").play();

    confetti({
        particleCount:500,
        spread:360
    });

}

</script>

</body>
</html>
