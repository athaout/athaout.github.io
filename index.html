<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#ff4da6,#7b5cff);
    color:white;
}

.container{
    padding:40px;
}

h1{
    font-size:55px;
    margin-bottom:15px;
}

p{
    font-size:22px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container" id="content"></div>

<audio id="music" src="hbd.mp3"></audio>

<script>

const content = document.getElementById("content");

function fire(){
    confetti({
        particleCount:200,
        spread:180,
        origin:{y:0.6}
    });
}

window.playBirthday=function(){
    document.getElementById("music").play();

    confetti({
        particleCount:500,
        spread:360
    });
}

function updateCountdown(){

    const now = new Date();

    // Target 16 Juli jam 00:00
    const target = new Date(now.getFullYear(),6,16,0,0,0);

    const diff = target - now;

    if(diff <= 0){

        content.innerHTML=`
        <h1>🎉 Happy Birthday! 🎂</h1>

        <div style="font-size:40px;font-weight:bold;margin:20px 0;">
        00 Hari 00:00:00
        </div>

        <p>Semoga panjang umur, sehat selalu,<br>
        dan semua impianmu menjadi kenyataan. ❤️</p>

        <button onclick="playBirthday()">🎵 Putar Musik</button>
        `;

        fire();

        if(!window.confettiLoop){
            window.confettiLoop = setInterval(fire,3000);
        }

        return;
    }

    const hari = Math.floor(diff/(1000*60*60*24));
    const jam = Math.floor((diff/(1000*60*60))%24);
    const menit = Math.floor((diff/(1000*60))%60);
    const detik = Math.floor((diff/1000)%60);

    content.innerHTML=`
    <h1>🎁</h1>

    <div style="font-size:40px;font-weight:bold;margin:20px 0;">
    ${hari} Hari ${String(jam).padStart(2,'0')}:${String(menit).padStart(2,'0')}:${String(detik).padStart(2,'0')}
    </div>

    <p>Menuju <b>16 Juli</b></p>
    `;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
