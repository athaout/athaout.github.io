<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#ff4da6,#7b5cff);
    color:white;
}

.container{
    padding:40px;
    max-width:900px;
}

h1{
    font-size:55px;
    margin-bottom:30px;
}

#timer{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    font-size:35px;
    font-weight:bold;
}

button{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="container">

<h1 id="title">🎁</h1>

<div id="timer">Loading...</div>

<div id="extra"></div>

</div>

<audio id="music" src="hbd.mp3"></audio>

<script>

const title=document.getElementById("title");
const timer=document.getElementById("timer");
const extra=document.getElementById("extra");

function countdown(){

const now=new Date();

let target=new Date(now.getFullYear(),6,16,0,0,0);

if(now>target && !(now.getDate()==19 && now.getMonth()==6)){
target.setFullYear(target.getFullYear()+1);
}

const distance=target-now;

if(now.getDate()==19 && now.getMonth()==6){

title.innerHTML="🎉 Happy Birthday! 🎂";

timer.innerHTML=`
<span>00 Hari</span>
<span>00 Jam</span>
<span>00 Menit</span>
<span>00 Detik</span>
`;

extra.innerHTML=`
<button onclick="playBirthday()">🎵 Putar Musik</button>
`;

fire();

if(!window.loop){
window.loop=true;
setInterval(fire,3000);
}

return;
}

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

title.innerHTML="🎁";

timer.innerHTML=`
<span>${days} Hari</span>
<span>${String(hours).padStart(2,'0')} Jam</span>
<span>${String(minutes).padStart(2,'0')} Menit</span>
<span>${String(seconds).padStart(2,'0')} Detik</span>
`;

}

function fire(){
confetti({
particleCount:200,
spread:180,
origin:{y:0.6}
});
}

function playBirthday(){

document.getElementById("music").play();

confetti({
particleCount:500,
spread:360
});

}

countdown();
setInterval(countdown,1000);

</script>

</body>
</html>
